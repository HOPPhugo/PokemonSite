        <button class="Categorie" id="G1">

        <button class="Categorie" id="G2">
            <article class="GenTitle">
                <span>Génération 2</span><br>
            </article>
            <section>
                <article>
                    <div class="Groupe">
                        <img class="Images" id="PokemonOr" src="./Images/Jaquette_de_Pokémon_Or.png" alt="Jackette du jeu pokemon or">
                        <a ><img id="PetitArgent" src="./Images/Jaquette_de_Pokémon_Argent.png" alt="Jackette du jeu pokemon argent" ></a>
                    </div>
                    <summary>
                        Description <br>
                        <span id="Description">Le joueur commence son voyage de Bourg Geon, où le Professeur Orme lui demande d'aller à la maison de M. Pokémon pour découvrir ce qui le passionnait tellement. Orme fournit au joueur l'un des trois Pokémon de départ, Germignon , Héricendre ou Kaiminus. Après que la découverte de M. Pokémon se soit avérée être un Œuf, le joueur retourne à Bourg Geon, mais il découvre qu'un garçon aux cheveux roux suspect, vu caché à l'extérieur du laboratoire plus tôt, a volé l'un des Pokémon du Professeur. Après l'avoir battu et être retourné à Bourg Geon, le joueur donne le nom du garçon (son nom par défaut est Silver ou Gold) à un officier de police qui est venu enquêter sur l'incident. Orme est étonné par l'Œuf et insiste pour l'étudier, permettant au joueur de garder le Pokémon avec lequel il a voyagé en tant que Pokémon de départ. À partir de là, il encourage le joueur à parcourir Johto et à défier les huit Champions d'Arènes, Albert, Hector, Blanche, Mortimer, Chuck, Jasmine, Frédo et Sandra, et finalement la Ligue Pokémon. Avec la première Arène dans la ville voisine de Mauville, le joueur part à l'aventure.<br></span>
                        
                    </summary>
                </article>
            </section>
            <section>
                <article>
                    <div class="Groupe">
                        <img class="Images" id="Pokemoncristal" src="./Images/Jaquette_de_Pokémon_Cristal.png" alt="IMAGE">
                    </div>
                    <summary>
                        Description <br>
                        <span id="Description">la version complémentaire de Pokémon Or et Argent, sortie sur Game Boy Color le 14 décembre 2000 au Japon et le 31 octobre 2001 en Europe. Comme toutes les « troisièmes versions », il s'agit globalement du même jeu avec quelques améliorations.<br></span>
                        
                    </summary>
                </article>
            </section>
        </button>

        
        <button class="Categorie" id="G3">
            <article class="GenTitle">
                <span>Génération 3</span><br>
            </article>
            <section>
                <article>
                    <div class="Groupe">
                        <img class="Images" id="PokemonRubis" src="./Images/Jaquette_de_Pokémon_Rubis.png" alt="Jackette du jeu pokemon Rubis">
                        <a ><img id="PetitSaphir" src="./Images/Jaquette_de_Pokémon_Saphir.png" alt="Jackette du jeu pokemon Saphir" ></a>
                    </div>
                    <summary>
                        Description <br>
                        <span id="Description">Le joueur incarne un jeune Dresseur en provenance de la région de Johto et dont la famille a déménagé à Bourg-en-Vol, une petite bourgade de la région de Hoenn, afin que le père, Norman, puisse assurer ses fonctions de Champion de l'Arène de Clémenti-Ville. Peu de temps après son installation, le joueur fait la rencontre du Professeur Seko, en mauvaise posture puisque poursuivi par un Medhyèna. En choisissant son Pokémon de départ pour lui venir en aide, il fait son premier choix dans une aventure qui l'amènera à affronter une multitude de Dresseurs, remporter des Badges d'Arène pour finalement affronter le Conseil 4, mais également déjouer les plans d'une Team maléfique et faire la rencontre d'un Pokémon légendaire menaçant l'équilibre du monde.<br></span>
                        
                    </summary>
                </article>
            </section>
            <section>
                <article>
                    <div class="Groupe">
                        <img class="Images" id="PokemonEmeraude" src="./Images/Jaquette_de_Pokémon_Émeraude.png" alt="Jackette du jeu pokemon Emeraude ">
                    </div>
                    <summary>
                        Description <br>
                        <span id="Description">C'est le successeur de Pokémon Rubis et Saphir, la « troisième version », comparable à Pokémon Jaune et Cristal. Sa pochette est illustrée par le Pokémon légendaire Rayquaza. L'histoire se passe donc encore à Hoenn et le scénario reste globalement le même, même si de nombreux aspects du jeu ont été remaniés.<br></span>
                        
                    </summary>
                </article>
            </section>
            <section>
                <article>
                    <div class="Groupe">
                        <img class="Images" id="PokemonRougeFeu" src="./Images/Jaquette_de_Pokémon_Rouge_Feu.png" alt="Jackette du jeu pokemon rouge feu">
                        <a ><img id="PetitVertFeuille" src="./Images/Jaquette_de_Pokémon_Vert_Feuille.png" alt="Jackette du jeu pokemon vert feuille" ></a>
                    </div>
                    <summary>
                        Description <br>
                        <span id="Description">Le joueur incarne un jeune garçon ou une jeune fille bien décidé(e) à devenir Maître Pokémon. Le Professeur Chen lui offre son 1er Pokémon de son choix pour qu'il obtienne les 8 Badges de la région, qu'il/elle complète le Pokédex et qu'il/elle batte la Team Rocket. Le scénario est en fait globalement le même que dans les jeux Pokémon Rouge et Bleu.<br></span>
                        
                    </summary>
                </article>
            </section>
        </button>

        <button class="Categorie" id="G7">
            <article class="GenTitle">
                <span>Génération 7</span><br>
            </article>
            <section>
                <article>
                    <div class="Groupe">
                        <img class="Images" id="PokemonSoleil" src="./Images/Jaquette_de_Pokémon_Soleil.png" alt="IMAGE">
                        <a ><img id="PetitLunala" src="./Images/Jaquette_de_Pokémon_Lune.png" alt="" ></a>
                    </div>
                    <summary>
                        Description <br>
                        <span id="Description">Le jeu se déroule dans la région insulaire et paradisiaque d'Alola, inspirée de l'île d'Oahu, dans l'archipel d'Hawaï. Cette région est composée de quatre îles, ainsi que d'une île artificielle, le paradis Æther. Chacune des îles naturelles est sous la surveillance de Pokémon protecteurs, appelés les Toko ; vénérés par les habitants, ce sont eux aussi qui choisissent les doyens. La première île est Mele-mele, où le héros a déménagé, et son protecteur est Tokorico ; la deuxième île est Akala, dont le Pokémon protecteur est Tokopiyon ; la troisième, Ula-Ula, dont le Pokémon protecteur est Tokotoro ; la dernière s'appelle Poni, dont le Pokémon Protecteur est Tokopisco.<br></span>
                        
                    </summary>
                </article>
            </section>
            <section>
                <article>
                    <div class="Groupe">
                        <img class="Images" id="PokemonUltraSoleil" src="./Images/Jaquette_de_Pokémon_Ultra-Soleil.jpg" alt="IMAGE">
                        <a ><img id="PetitUltraLunala" src="./Images/Jaquette_de_Pokémon_Ultra-Lune.jpg" alt="" ></a>
                    </div>
                    <summary>
                        Description <br>
                        <span id="Description">Le jeu se déroule dans la région insulaire et paradisiaque d'Alola, inspirée de l'île d'Oahu, dans l'archipel d'Hawaï. Cette région est composée de quatre îles, ainsi que d'une île artificielle, le paradis Æther. Chacune des îles naturelles est sous la surveillance de Pokémon protecteurs, appelés les Toko ; vénérés par les habitants, ce sont eux aussi qui choisissent les doyens. La première île est Mele-mele, où le héros a emménagé, et son protecteur est Tokorico ; la deuxième île est Akala, dont le Pokémon protecteur est Tokopiyon ; la troisième, Ula-Ula, dont le Pokémon protecteur est Tokotoro ; la dernière s'appelle Poni, dont le Pokémon protecteur est Tokopisco.<br></span>
                        
                    </summary>
                </article>
            </section>
            <section>
                <article>
                    <div class="Groupe">
                        <img class="Images" id="PokemonPikachu" src="./Images/Jaquette_de_Pokémon_Let's_Go_Pikachu.png" alt="IMAGE">
                        <a ><img id="PetitEvolie" src="./Images/Jaquette_de_Pokémon_Let's_Go_Évoli.png" alt="" ></a>
                    </div>
                    <summary>
                        Description <br>
                        <span id="Description">Le joueur incarne un enfant de Bourg Palette dans la région de Kanto. En allant à la rencontre du Professeur Chen, il tombe sur un Pokémon sauvage inhabituel qui se prend d'affection pour lui, au point de devenir le Pokémon de départ du jeune Dresseur incarné. Le joueur a pour mission de remplir le Pokédex, ce qui l'amène à obtenir les Badges des huit Arènes locales et à croiser le chemin d'une organisation criminelle qu'il décide d'arrêter. Pour remplir son objectif, le joueur doit au final affronter les Dresseurs les plus puissants de la région, le Conseil 4, et partir à la recherche des Pokémon légendaires.<br></span>
                        
                    </summary>
                </article>
            </section>
